<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>مسابقة حروف</title>
    <meta name="theme-color" content="#07130d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: #07130d;
        font-family: "Noto Kufi Arabic", "Dubai", "Segoe UI", Tahoma, Arial, sans-serif;
        direction: rtl;
        color: #fff;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 22px;
        padding: 32px 24px;
        text-align: center;
      }
      .logo {
        width: 64px; height: 64px;
        fill: #f2c94c; opacity: .85;
        filter: drop-shadow(0 0 12px rgba(242,201,76,.28));
      }
      h1 { color: #f2c94c; font-size: clamp(1.8rem,7vw,2.6rem); font-weight: 900; letter-spacing: .04em; }
      .sub { color: rgba(255,255,255,.42); font-size: .92rem; margin-top: -10px; }

      .enter-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: clamp(230px,72vw,340px);
        padding: 18px 0;
        border-radius: 14px;
        background: linear-gradient(180deg,#1c3d22 0%,#0e2214 100%);
        border: 2px solid rgba(114,204,32,.70);
        color: #90e030;
        font-family: inherit;
        font-size: clamp(1.1rem,4.5vw,1.35rem);
        font-weight: 700;
        text-decoration: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        transition: transform .1s;
      }
      .enter-btn:active { transform: scale(.97); }
      .enter-btn svg { fill: #90e030; width: 22px; height: 22px; flex-shrink: 0; }

      .room-badge {
        background: linear-gradient(180deg,#1e2d22 0%,#0e1a12 100%);
        border: 1px solid rgba(255,255,255,.1);
        border-top: 3px solid rgba(242,201,76,.40);
        border-radius: 10px;
        padding: 10px 28px;
        font-size: .85rem;
        color: rgba(255,255,255,.45);
      }
      .room-badge strong {
        color: #f2c94c; font-size: 1.2rem;
        letter-spacing: .14em; margin-right: 6px;
      }
    </style>
    <script>
      /* إذا التطبيق مفتوح في وضع standalone → انتقل فوراً لشاشة الاختيار */
      (function () {
        var sa  = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
        var ios = window.navigator.standalone;
        if (sa || ios) {
          var p = new URLSearchParams(location.search);
          var hash = new URLSearchParams(location.hash.replace(/^#/, ''));
          if (!p.get('room') && hash.get('room')) p.set('room', hash.get('room'));
          location.replace('index.html?' + p);
        }
      }());
    </script>
  </head>
  <body>
    <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
    </svg>

    <h1>مسابقة حروف</h1>
    <p class="sub">اضغط للدخول على المسابقة</p>

    <a class="enter-btn" id="enter-btn" href="#">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M8 5v14l11-7z"/>
      </svg>
      دخول المسابقة
    </a>

    <div class="room-badge">
      رمز الغرفة <strong id="room-num">------</strong>
    </div>

    <script>
      var params   = new URLSearchParams(location.search);
      var hash     = new URLSearchParams(location.hash.replace(/^#/, ''));
      var room     = params.get('room') || hash.get('room') || '';
      var appUrl   = new URL('index.html', location.href);
      if (room) appUrl.searchParams.set('room', room);
      if (room) appUrl.hash = 'room=' + room;

      var btn    = document.getElementById('enter-btn');
      var roomEl = document.getElementById('room-num');

      if (roomEl && room) roomEl.textContent = room;
      if (btn) btn.href = appUrl.toString();
    </script>
  </body>
</html>
