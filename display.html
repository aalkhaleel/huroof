<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>مسابقة حروف — شاشة المتسابقين</title>
    <meta name="theme-color" content="#003600">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="حروف">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://huroof-ca360-default-rtdb.firebaseio.com">
    <link rel="stylesheet" href="display.css?v=20260616-1">
  </head>
  <body>
    <div class="display-app">
      <header class="display-header">
        <div class="disp-team red-team">
          <div class="disp-wins" id="disp-red-score">0</div>
          <div class="disp-name" id="disp-red-name">الأحمر</div>
        </div>

        <div class="disp-center">
          <div class="disp-timer" id="disp-timer">00:30</div>
          <form class="display-room-form" id="display-room-form" aria-label="دخول غرفة المسابقة">
            <label for="display-room-code">رمز الغرفة</label>
            <div class="display-room-row">
              <input id="display-room-code" name="room" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000" autocomplete="one-time-code" aria-label="رمز الغرفة">
              <button type="submit">دخول</button>
            </div>
          </form>
        </div>

        <div class="disp-team green-team">
          <div class="disp-wins" id="disp-green-score">0</div>
          <div class="disp-name" id="disp-green-name">الأخضر</div>
        </div>
      </header>

      <main class="display-main">
        <div class="display-board-zone">
          <div class="board-frame">
            <div class="letter-board" id="letter-board" role="grid" aria-label="لوحة الحروف"></div>
          </div>

          <div class="round-message" id="round-message" hidden>
            <span id="round-message-label">اكتمل الخط</span>
            <strong id="round-winner-name"></strong>
          </div>
        </div>

        <div class="display-question">
          <div class="contestant-buzz" aria-label="طلب الإجابة">
            <div class="contestant-buzz-buttons">
              <button class="contestant-buzz-button red-team" id="display-red-buzz" type="button" disabled>
                <span>طلب الإجابة</span>
                <strong id="display-red-buzz-name">الأحمر</strong>
              </button>
              <button class="contestant-buzz-button green-team" id="display-green-buzz" type="button" disabled>
                <span>طلب الإجابة</span>
                <strong id="display-green-buzz-name">الأخضر</strong>
              </button>
            </div>
          </div>
          <button class="display-exit-button" id="display-exit-game" type="button" aria-label="الخروج من اللعبة" title="الخروج من اللعبة">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <path d="M16 17l5-5-5-5"></path>
              <path d="M21 12H9"></path>
            </svg>
            خروج
          </button>
        </div>
      </main>
    </div>

    <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script defer src="firebase-config.js?v=20260520-2"></script>
    <script defer src="sync.js?v=20260520-2"></script>
    <script defer src="pwa.js?v=20260614-1"></script>
    <script defer src="display.js?v=20260615-3"></script>
  </body>
</html>
